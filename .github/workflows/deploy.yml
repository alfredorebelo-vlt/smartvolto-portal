name: Build e Deploy para cPanel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Gerar cliente Prisma
        run: npx prisma generate
        env:
          DATABASE_URL: "mariadb://build:build@localhost:3306/build"

      - name: Build Next.js
        run: npm run build
        env:
          DATABASE_URL: "mariadb://build:build@localhost:3306/build"
          AUTH_SECRET: "build-placeholder-secret-xxxxxxxxxxxxxxxxxxxxxxxx"
          AUTH_TRUST_HOST: "true"
          AUTH_GOOGLE_ID: "placeholder.apps.googleusercontent.com"
          AUTH_GOOGLE_SECRET: "placeholder-secret"
          NEXTAUTH_URL: "https://voltosmart.voltodrive.com"
          NODE_ENV: "production"

      - name: Preparar ficheiros para deploy
        run: |
          # Guarda os ficheiros WASM necessários antes de limpar .next/node_modules
          PRISMA_DIR=$(find .next/node_modules/@prisma -maxdepth 1 -type d -name "client-*" 2>/dev/null | head -1)
          if [ -n "$PRISMA_DIR" ]; then
            PRISMA_HASH=$(basename "$PRISMA_DIR")
            mkdir -p /tmp/prisma-wasm/runtime
            cp "$PRISMA_DIR/package.json" /tmp/prisma-wasm/
            cp "$PRISMA_DIR/runtime/query_compiler_fast_bg.mysql.mjs" /tmp/prisma-wasm/runtime/
            cp "$PRISMA_DIR/runtime/query_compiler_fast_bg.mysql.wasm-base64.mjs" /tmp/prisma-wasm/runtime/

            # Remove .next/node_modules por completo (tem symlinks que o FTP cPanel não suporta)
            rm -rf .next/node_modules

            # Recria sem symlinks — só os 3 ficheiros necessários em runtime
            mkdir -p ".next/node_modules/@prisma/$PRISMA_HASH/runtime"
            cp /tmp/prisma-wasm/package.json ".next/node_modules/@prisma/$PRISMA_HASH/"
            cp /tmp/prisma-wasm/runtime/query_compiler_fast_bg.mysql.mjs ".next/node_modules/@prisma/$PRISMA_HASH/runtime/"
            cp /tmp/prisma-wasm/runtime/query_compiler_fast_bg.mysql.wasm-base64.mjs ".next/node_modules/@prisma/$PRISMA_HASH/runtime/"
          fi

          # Remove cache e ficheiros desnecessários da build
          rm -rf .next/cache .next/dev .next/diagnostics
          rm -f .next/trace .next/trace-build

      - name: Deploy via FTP para cPanel
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
          FTP_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          sudo apt-get install -q -y lftp

          # Regex ancorado ao início: exclui node_modules/ raiz mas NÃO .next/node_modules/
          # --dereference: converte qualquer symlink restante em ficheiro real
          cat > /tmp/deploy.lftp << LFTP
          open -u "$FTP_USER,$FTP_PASS" ftp://$FTP_SERVER
          set ftp:ssl-allow yes
          set ssl:verify-certificate no
          set mirror:dereference yes
          set net:timeout 30
          set net:max-retries 3
          set net:reconnect-interval-base 5
          mirror -R --parallel=4 \
            --exclude '^node_modules($|/)' \
            --exclude '^\.git($|/)' \
            --exclude '^\.claude($|/)' \
            --exclude '\.env($|\.)' \
            --exclude '\.sql$' \
            --exclude '\.log$' \
            . $FTP_DIR
          bye
          LFTP

          lftp -f /tmp/deploy.lftp
