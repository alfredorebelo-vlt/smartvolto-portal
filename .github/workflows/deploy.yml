name: Build e Deploy para cPanel

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Gerar cliente Prisma
        run: npx prisma generate
        env:
          DATABASE_URL: "mariadb://build:build@localhost:3306/build"

      - name: Build Next.js
        run: npm run build
        env:
          DATABASE_URL: "mariadb://build:build@localhost:3306/build"
          AUTH_SECRET: "build-placeholder-secret-xxxxxxxxxxxxxxxxxxxxxxxx"
          AUTH_TRUST_HOST: "true"
          AUTH_GOOGLE_ID: "placeholder.apps.googleusercontent.com"
          AUTH_GOOGLE_SECRET: "placeholder-secret"
          NEXTAUTH_URL: "https://voltosmart.voltodrive.com"
          NODE_ENV: "production"

      - name: Limpar .next/node_modules — manter só MySQL WASM
        run: |
          PRISMA_DIR=$(find .next/node_modules/@prisma -maxdepth 1 -type d -name "client-*" 2>/dev/null | head -1)
          if [ -n "$PRISMA_DIR" ]; then
            find "$PRISMA_DIR/runtime" -type f \
              ! -name "query_compiler_fast_bg.mysql.mjs" \
              ! -name "query_compiler_fast_bg.mysql.wasm-base64.mjs" \
              -delete
          fi

      - name: Deploy via FTP para cPanel
        uses: SamKirkland/FTP-Deploy-Action@4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          local-dir: "./"
          exclude: |
            **/.git*
            **/.git*/**
            node_modules/**
            **/.env*
            .next/cache/**
            .next/dev/**
            .next/trace
            .next/trace-build
            .next/diagnostics/**
            .next/types/**
            claude design/**
            .claude/**
            **/*.sql
            **/*.log
            **/*.tsbuildinfo
            next-env.d.ts
            coverage/**
