name: Build e Deploy para cPanel

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Gerar cliente Prisma
        run: npx prisma generate
        env:
          DATABASE_URL: "mariadb://build:build@localhost:3306/build"

      - name: Build Next.js
        run: npm run build
        env:
          DATABASE_URL: "mariadb://build:build@localhost:3306/build"
          AUTH_SECRET: "build-placeholder-secret-xxxxxxxxxxxxxxxxxxxxxxxx"
          AUTH_TRUST_HOST: "true"
          AUTH_GOOGLE_ID: "placeholder.apps.googleusercontent.com"
          AUTH_GOOGLE_SECRET: "placeholder-secret"
          NEXTAUTH_URL: "https://voltosmart.voltodrive.com"
          NODE_ENV: "production"

      - name: Preparar ficheiros para deploy
        run: |
          # Remove node_modules — o servidor instala via npm (evita upload de centenas de MB)
          rm -rf node_modules

          # Mantém só os ficheiros WASM MySQL necessários em runtime
          PRISMA_DIR=$(find .next/node_modules/@prisma -maxdepth 1 -type d -name "client-*" 2>/dev/null | head -1)
          if [ -n "$PRISMA_DIR" ]; then
            find "$PRISMA_DIR/runtime" -type f \
              ! -name "query_compiler_fast_bg.mysql.mjs" \
              ! -name "query_compiler_fast_bg.mysql.wasm-base64.mjs" \
              -delete
          fi

          # Remove cache e ficheiros desnecessários da build
          rm -rf .next/cache .next/dev .next/diagnostics
          rm -f .next/trace .next/trace-build

      - name: Deploy via FTP para cPanel
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
          FTP_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          sudo apt-get install -q -y lftp

          cat > /tmp/deploy.lftp << LFTP
          open -u "$FTP_USER,$FTP_PASS" ftp://$FTP_SERVER
          set ftp:ssl-allow yes
          set ssl:verify-certificate no
          mirror -R --parallel=4 \
            --exclude-glob .git/ \
            --exclude-glob .claude/ \
            --exclude-glob .env \
            --exclude-glob .env.* \
            --exclude-glob *.sql \
            --exclude-glob *.log \
            . $FTP_DIR
          bye
          LFTP

          lftp -f /tmp/deploy.lftp
