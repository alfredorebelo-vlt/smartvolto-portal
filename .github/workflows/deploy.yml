name: Build e Deploy para cPanel

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sincronizar main -> deploy com .env.production
        env:
          ENV_PRODUCTION: ${{ secrets.ENV_PRODUCTION }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin deploy
          git checkout -B deploy origin/deploy
          git merge -X theirs main --no-edit

          # Injectar variáveis de ambiente de produção a partir do secret
          if [ -n "$ENV_PRODUCTION" ]; then
            echo "ENV_PRODUCTION secret encontrado ($(printf '%s' "$ENV_PRODUCTION" | wc -c) bytes)"
            printf '%s' "$ENV_PRODUCTION" > .env.production
            git add -f .env.production
            git diff --staged --quiet || git commit -m "ci: inject .env.production from secrets"
          else
            echo "ENV_PRODUCTION secret vazio — a remover .env.production do branch deploy para não sobrescrever ficheiro manual no servidor"
            git rm --cached .env.production 2>/dev/null || true
            git diff --staged --quiet || git commit -m "ci: remove empty .env.production from deploy branch"
          fi

          git push origin deploy
